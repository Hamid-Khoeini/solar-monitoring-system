services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: Hamid@123
      DOCKER_INFLUXDB_INIT_ORG: fire-org
      DOCKER_INFLUXDB_INIT_BUCKET: fire-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: super-secret-fire-token

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb

  ingestion:
    build: ./ingestion
    depends_on:
      - influxdb

volumes:
  influxdb_data: